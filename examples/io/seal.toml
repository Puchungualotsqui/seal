[package]
name = "ioExample"
version = "0.1.1"
kind = "executable"
dependencies = [
    "io",
    "mem",
]

[build]
compiler = "cc"

[compiler.default]
standard = "c11"
c_flags = [
    "-Wall",
    "-Wextra",
]

[compiler.gcc]
c_flags = [
    "-Wall",
    "-Wextra",
    "-Wpedantic",
]

[compiler.clang]
c_flags = [
    "-Wall",
    "-Wextra",
    "-Wconversion",
]
